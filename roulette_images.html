
<style>
  #roulette-wrap {
    background: #000;
    width: 100%;
    min-height: 520px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    padding: 32px 0;
  }
  #slot {
    width: 100%;
    max-width: 700px;
    height: 380px;
    position: relative;
    overflow: hidden;
  }
  #slot img {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity 0s;
  }
  #slot img.visible { opacity: 1; }
  #btn {
    padding: 14px 48px;
    font-size: 18px;
    font-family: 'Times New Roman', serif;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    background: transparent;
    color: white;
    border: 2px solid white;
    cursor: pointer;
  }
  #btn:hover { background: white; color: black; }
  #status {
    color: #888;
    font-family: 'Times New Roman', serif;
    font-size: 14px;
    letter-spacing: 0.1em;
    min-height: 20px;
  }
</style>

<div id="roulette-wrap">
  <div id="slot">
    <img src="https://picsum.photos/seed/a1/700/380" class="visible">
    <img src="https://picsum.photos/seed/b2/700/380">
    <img src="https://picsum.photos/seed/c3/700/380">
    <img src="https://picsum.photos/seed/d4/700/380">
    <img src="https://picsum.photos/seed/e5/700/380">
    <img src="https://picsum.photos/seed/f6/700/380">
    <img src="https://picsum.photos/seed/g7/700/380">
    <img src="https://picsum.photos/seed/h8/700/380">
  </div>
  <div id="status">Clique pour lancer</div>
  <button id="btn">LANCER</button>
</div>

<script>
const imgs = document.querySelectorAll('#slot img');
const btn = document.getElementById('btn');
const status = document.getElementById('status');
let current = 0;
let spinning = false;
let timer = null;

function show(i) {
  imgs[current].classList.remove('visible');
  current = i % imgs.length;
  imgs[current].classList.add('visible');
}

function spin() {
  if (spinning) {
    stop();
    return;
  }
  spinning = true;
  btn.textContent = 'STOP';
  status.textContent = '...';

  let delay = 80;
  let count = 0;

  function tick() {
    show(Math.floor(Math.random() * imgs.length));
    count++;
    if (count < 8) {
      delay = 80;
    } else if (count < 16) {
      delay = 120;
    } else {
      delay = 160;
    }
    timer = setTimeout(tick, delay);
  }
  tick();
}

function stop() {
  spinning = false;
  clearTimeout(timer);
  btn.textContent = 'RELANCER';
  status.textContent = 'Image #' + (current + 1);
}

btn.addEventListener('click', spin);
</script>
