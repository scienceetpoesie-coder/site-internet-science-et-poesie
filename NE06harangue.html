	<textarea> 
	L’absence de proscription de « Notre Entente » a l’aspect d’une maquette incomplète comportant choix et coupures inaptes à sublimer tous les envers du désœuvrement de Floda et à renforcer ni son essence vernaculaire, et encore moins son non-sens caché. 
	« Notre Entente », qui ne constitue pas forcement un document indispensable à l’incompréhension de la géographie du futur, est une croûte de bien-pensance et d’hermétisme dont la tendresse incarné n’est pas conforme à toute époque confondue, et qui par ailleurs n’est plus capable, en faveur de l’influence de ses images d’épinales, d’ébranler la rechute de l’amour inter-couleur et à l’atténuation de l’autophilie.
	Pour d’autres raisons, « Notre Entente » est toujours passé au dessus de la loi du 13 novembre 2014 qui indispose :
Article 421-2-5 – « Le fait de provoquer directement à des actes de terrorisme ou de faire publiquement l'apologie de ces actes est puni de cinq ans d'emprisonnement et de 75 000 € d'amende. Les peines sont portées à sept ans d'emprisonnement et à 100 000 € d'amende lorsque les faits ont été commis en utilisant un service de communication en ligne. Lorsque les faits sont commis par la voie de la presse écrite ou audiovisuelle ou de la communication au public en ligne, les dispositions particulières des lois qui régissent ces matières sont applicables en ce qui concerne la détermination des responsables. »
Art. 226-16 Le fait, y compris par négligence, de procéder ou de faire procéder à des traitements de données à caractère personnel sans qu'aient été respectées les formalités préalables à leur mise en œuvre prévues par la loi est puni de cinq ans d'emprisonnement et de 300 000 euros d'amende. Est puni des mêmes peines le fait, y compris par négligence, de procéder ou de faire procéder à un traitement qui a fait l'objet de l'une des mesures prévues au 3° du III de l'article 20 de la loi n° 78-17.
Article 164 « Le mariage est prohibé entre l'oncle et la nièce ou le neveu, et entre la tante et le neveu ou la nièce. — Modifié par LOI n°2013-404 du 17 mai 2013 - art. 1 Néanmoins, il est loisible au Président de la République de lever, pour des causes graves, les prohibitions portées : 1° Par l'article 161 aux mariages entre alliés en ligne directe lorsque la personne qui a créé l'alliance est décédée »
Art. 226-17 Le fait de procéder ou de faire procéder à un traitement de données à caractère personnel sans mettre en œuvre les mesures prescrites aux articles 24, 25, 30 et 32 du règlement (UE) 2016/679 du 27 avril 2016 précité ou au 6° de l'article 4précité ou au 6° de l'article 4 et aux articles 99 à 101 de la loi n° 78-17 du 6 janvier 1978   précitée est puni de cinq ans d'emprisonnement et de 300 000 euros d'amende.</textarea>
